        color: { color: `${color}88`, highlight: color, hover: color },
        arrows: { to: { enabled: false } },
        title: `[${c.type}] ${c.desc}`,
        smooth: { type: "curvedCW", roundness: 0.3 },
        dashes: [8, 4],
    });
});

// =============================================================================
// еҲӣе»әзҪ‘з»ңеӣҫ
// =============================================================================

const container = document.getElementById("network");
const data = { nodes, edges };

const options = {
    physics: {
        enabled: true,
        barnesHut: {
            gravitationalConstant: -3000,
            centralGravity: 0.3,
            springLength: 200,
            springConstant: 0.04,
            damping: 0.09,
        },
        stabilization: {
            iterations: 200,
        },
    },
    interaction: {
        hover: true,
        tooltipDelay: 150,
        zoomView: true,
        dragView: true,
        multiselect: true,
        navigationButtons: false,
    },
    layout: {
        improvedLayout: true,
    },
};

const network = new vis.Network(container, data, options);

// =============================================================================
// дәӨдә’дәӢд»¶
// =============================================================================

network.on("click", function (params) {
    if (params.nodes.length === 1) {
        const nodeId = params.nodes[0];
        showNodeDetail(nodeId);
    } else if (params.nodes.length === 0 && params.edges.length === 1) {
        const edgeId = params.edges[0];
        const edge = edges.get(edgeId);
        if (edge) {
            showEdgeDetail(edge);
        }
    }
});

network.on("doubleClick", function (params) {
    if (params.nodes.length === 1) {
        const nodeId = params.nodes[0];
        highlightConnected(nodeId);
    }
});

// =============================================================================
// йқўжқҝеҠҹиғҪ
// =============================================================================

function showNodeDetail(nodeId) {
    const node = nodes.get(nodeId);
    if (!node) return;

    const panel = document.getElementById("infoPanel");
    const content = document.getElementById("panelContent");

    const isPhenomenon = node.group === "phenomenon";
    const connectedEdges = network.getConnectedEdges(nodeId);

    let html = `<h3>${isPhenomenon ? "рҹ“Ҡ иЎЁиұЎиҠӮзӮ№" : "рҹ”Қ ж №еӣ иҠӮзӮ№"}</h3>`;
    html += `<div class="node-detail"><div class="label">еҗҚз§°</div><div class="value" style="font-size:18px;font-weight:600;">${node.label.replace(/\n/g, ' ')}</div></div>`;

    if (isPhenomenon) {
        const pNode = PHENOMENON_NODES.find(p => p.id === nodeId);
        if (pNode) {
            html += `<div class="node-detail"><div class="label">йҳҲеҖј</div><div class="value">${pNode.threshold}</div></div>`;
            html += `<div class="node-detail"><div class="label">иҜҙжҳҺ</div><div class="value">${pNode.desc}</div></div>`;
        }
    } else {
        const cNode = CAUSE_NODES.find(c => c.id === nodeId);
        if (cNode) {
            html += `<div class="node-detail"><div class="label">еҲҶзұ»</div><div class="value">${categoryIcons[cNode.category] || ''} ${cNode.category}</div></div>`;
            html += `<div class="node-detail"><div class="label">дёҘйҮҚзЁӢеәҰ</div><div class="value" style="color:${severityColors[cNode.severity]}">${cNode.severity}</div></div>`;
            html += `<div class="node-detail"><div class="label">иҜҙжҳҺ</div><div class="value">${cNode.desc}</div></div>`;
        }
    }

    // е…іиҒ”иҫ№дҝЎжҒҜ
    const relevantEdges = EDGES.filter(e => e.from === nodeId || e.to === nodeId);
    relevantEdges.sort((a, b) => b.weight - a.weight);

    if (relevantEdges.length > 0) {
        html += `<div class="node-detail" style="margin-top:16px;"><div class="label">е…іиҒ”е…ізі» (${relevantEdges.length})</div>`;
        relevantEdges.forEach(e => {
            const target = e.from === nodeId ? e.to.replace('c_', '') : e.from;
            const pct = (e.weight / 1.0) * 100;
            html += `<div class="weight-bar">
                <span class="bar-label">${target}</span>
                <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
                <span class="bar-value">${e.weight}</span>
            </div>`;
        });
        html += `</div>`;
    }

    // зҹӣзӣҫи§„еҲҷ
    const contradictions = CONTRADICTIONS.filter(c => c.from === nodeId || c.to === nodeId);
    if (contradictions.length > 0) {
        html += `<div class="node-detail" style="margin-top:12px;"><div class="label" style="color:#ef4444;">зҹӣзӣҫи§„еҲҷ (${contradictions.length})</div>`;
        contradictions.forEach(c => {
            const other = c.from === nodeId ? c.to : c.from;
            html += `<div style="font-size:13px;color:#fca5a5;margin:4px 0;">
                <span style="color:${c.type === 'exclusive' ? '#ef4444' : '#f97316'}">[${c.type}]</span>
                вҶ” ${other}: ${c.desc}
            </div>`;
        });
        html += `</div>`;
    }

    content.innerHTML = html;
    panel.classList.add("open");
}

function showEdgeDetail(edge) {
    const panel = document.getElementById("infoPanel");
    const content = document.getElementById("panelContent");

    const fromNode = nodes.get(edge.from);
    const toNode = nodes.get(edge.to);

    let html = `<h3>рҹ”— жҳ е°„е…ізі»</h3>`;
    html += `<div class="node-detail">
        <div class="label">иЎЁиұЎ</div>
        <div class="value">${fromNode ? fromNode.label.replace(/\n/g, ' ') : edge.from}</div>
    </div>`;
    html += `<div class="node-detail">
        <div class="label">ж №еӣ </div>
        <div class="value">${toNode ? toNode.label.replace(/\n/g, ' ') : edge.to}</div>
    </div>`;

    const edgeData = EDGES.find(e => e.from === edge.from && e.to === edge.to);
    if (edgeData) {
        const pct = (edgeData.weight / 1.0) * 100;
        html += `<div class="node-detail">
            <div class="label">жқғйҮҚ</div>
            <div class="weight-bar">
                <span class="bar-label">${edgeData.weight}</span>
                <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
                <span class="bar-value">${edgeData.weight}</span>
            </div>
        </div>`;
        html += `<div class="node-detail">
            <div class="label">иҜҙжҳҺ</div>
            <div class="value">${edgeData.desc}</div>
        </div>`;
    }

    content.innerHTML = html;
    panel.classList.add("open");
}

function highlightConnected(nodeId) {
    const connectedNodes = network.getConnectedNodes(nodeId);
    connectedNodes.push(nodeId);

    const allNodes = nodes.getIds();
    const updateList = allNodes.map(id => ({
        id,
        opacity: connectedNodes.includes(id) ? 1.0 : 0.15,
    }));
    nodes.update(updateList);

    const connectedEdges = network.getConnectedEdges(nodeId);
    const allEdges = edges.getIds();
    const edgeUpdateList = allEdges.map(id => ({
        id,
        opacity: connectedEdges.includes(id) ? 1.0 : 0.05,
    }));
    edges.update(edgeUpdateList);

    // 3з§’еҗҺжҒўеӨҚ
    setTimeout(() => {
        const restoreNodes = allNodes.map(id => ({ id, opacity: 1.0 }));
        nodes.update(restoreNodes);
        const restoreEdges = allEdges.map(id => ({ id, opacity: 1.0 }));
        edges.update(restoreEdges);
    }, 3000);
}

function closePanel() {
    document.getElementById("infoPanel").classList.remove("open");
}

// =============================================================================
// е·Ҙе…·ж ҸеҠҹиғҪ
// =============================================================================

let physicsEnabled = true;
let expectedVisible = true;

function toggleExpected() {
    expectedVisible = !expectedVisible;
    const updates = expectedEdgeIds.map(id => ({ id, hidden: !expectedVisible }));
    edges.update(updates);
    document.getElementById("expectedBtn").textContent = `йӘҢиҜҒиҫ№: ${expectedVisible ? 'ејҖ' : 'е…і'}`;
    document.getElementById("expectedBtn").classList.toggle('active', expectedVisible);
}

function togglePhysics() {
    physicsEnabled = !physicsEnabled;
    network.setOptions({ physics: { enabled: physicsEnabled } });
    document.getElementById("physicsBtn").textContent = `зү©зҗҶжЁЎжӢҹ: ${physicsEnabled ? 'ејҖ' : 'е…і'}`;
    document.getElementById("physicsBtn").classList.toggle('active', physicsEnabled);
}

function resetView() {
    network.fit({ animation: { duration: 500, easingFunction: "easeInOutQuad" } });
    closePanel();
}

// еҲқе§ӢйҖӮй…Қи§Ҷеӣҫ
network.once("stabilizationIterationsDone", function () {
    network.fit({ animation: true });
});
</script>

</body>
</html>
